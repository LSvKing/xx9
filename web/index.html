<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>xx9</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
</head>
<body>
  <!-- 登录遮罩 -->
  <div id="login" class="overlay hidden">
    <div class="login-box">
      <h2>xx9</h2>
      <input id="pw" type="password" placeholder="密码" autocomplete="current-password">
      <button id="login-btn">进入</button>
      <div id="login-err" class="err"></div>
    </div>
  </div>

  <!-- 顶栏 -->
  <header>
    <div class="brand" data-source="all">xx9</div>
    <input id="search" type="search" placeholder="搜索标题…">
    <select id="group"><option value="0">全部分类</option></select>
    <select id="sort">
      <option value="new">最新</option>
      <option value="hot">最热</option>
      <option value="long">最长</option>
    </select>
    <nav>
      <a data-source="home" class="active">首页</a>
      <a data-source="all">全部</a>
      <a data-source="fav">收藏</a>
      <a data-source="hist">历史</a>
    </nav>
    <button id="logout">退出</button>
  </header>

  <!-- 首页：分组聚合 -->
  <div id="home"></div>
  <!-- 专题面包屑（点专题进列表时显示）+ 封面墙 -->
  <div id="crumb" class="crumb hidden"></div>
  <main id="grid" class="hidden"></main>
  <div id="status" class="status hidden"></div>

  <!-- 播放器弹层 -->
  <div id="player" class="page hidden">
    <div class="pbar"><button id="close-player" class="back-btn">← 返回</button></div>
    <div class="player-box">
      <video id="video" controls playsinline></video>
      <div class="meta">
        <h3 id="p-title"></h3>
        <div class="actions">
          <button id="fav-btn">☆ 收藏</button>
          <a id="dl-btn" href="#">⬇ 下载</a>
          <select id="line-sel" title="切换线路（卡顿时换一条）"></select>
          <span id="p-stats" class="stats"></span>
        </div>
        <div id="p-tags" class="tags"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
